name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  id-token: write # Required for OIDC Trusted Publishing

env:
  CARGO_TERM_COLOR: always

jobs:
  publish:
    name: Publish to crates.io
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      # Run all checks before publishing
      - name: Run tests
        run: cargo test --workspace

      - name: Run clippy
        run: cargo clippy --workspace -- -D warnings

      # Authenticate via OIDC for crates.io Trusted Publishing
      - id: auth
        uses: rust-lang/crates-io-auth-action@v1

      # Publish derive crate first (dependency)
      - name: Publish struct-mapper-derive
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}
        run: cargo publish -p struct-mapper-derive

      # Wait for crates.io to index
      - name: Wait for indexing
        run: sleep 30

      # Publish main crate
      - name: Publish struct-mapper
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}
        run: cargo publish -p struct-mapper

      # Create GitHub Release
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          body: |
            ## 📦 Install

            ```toml
            [dependencies]
            struct-mapper = "${{ github.ref_name }}"
            ```

            See [CHANGELOG](CHANGELOG.md) for details.
